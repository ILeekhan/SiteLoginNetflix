<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Assistir filmes e séries | Netflix Clone">
    <title>Reproduzir | Netflix Clone</title>

    <!-- Fonte otimizada, igual em todas as páginas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="CSS/player.css">
</head>

<body>
    <div class="player-wrapper">
        <!-- Cabeçalho -->
        <header class="player-header">
            <div class="container header-content">
                <h1 class="logo">NETFLIX</h1>
                <button id="backBtn" class="btn back-btn">
                    ← Voltar
                </button>
            </div>
        </header>

        <main class="player-main">
            <div class="container">
                <div class="player-container">
                    <!-- Título e Descrição -->
                    <div class="movie-info">
                        <h1 id="movieTitle" class="movie-title">Título do conteúdo</h1>
                        <p id="movieDescription" class="movie-desc">
                            Descrição detalhada aparecerá aqui conforme o conteúdo selecionado.
                        </p>
                    </div>

                    <!-- Lista de Episódios -->
                    <section class="episodes-section">
                        <h3 class="section-subtitle">Episódios</h3>
                        <div class="episodes-container">
                            <button class="btn episode-btn" data-episode="1">
                                Episódio 1
                            </button>
                            <button class="btn episode-btn" data-episode="2">
                                Episódio 2
                            </button>
                            <button class="btn episode-btn" data-episode="3">
                                Episódio 3
                            </button>
                        </div>
                    </section>

                    <!-- Área do Vídeo -->
                    <section class="video-section">
                        <div class="video-wrapper">
                            <iframe id="movieTrailer" width="100%" height="500" src="" frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                allowfullscreen loading="lazy"></iframe>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="Js/player.js" defer></script>
</body>

</html>
