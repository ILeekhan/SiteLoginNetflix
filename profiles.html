<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quem está assistindo? - Netflix</title>
    <link rel="stylesheet" href="CSS/profiles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="profiles-container">
        <h1 class="logo">NETFLIX</h1>
        <h2 class="titulo-perfil">Quem está assistindo?</h2>

        <div class="grid-perfis">
            <div class="card-perfil" data-perfil="Principal">
                <div class="avatar-perfil cor1">
                    <span id="inicialUsuario"></span>
                </div>
                <p class="nome-perfil">Principal</p>
            </div>
            <div class="card-perfil" data-perfil="Infantil">
                <div class="avatar-perfil cor2">👶</div>
                <p class="nome-perfil">Infantil</p>
            </div>
            <div class="card-perfil" data-perfil="Convidado">
                <div class="avatar-perfil cor3">👤</div>
                <p class="nome-perfil">Convidado</p>
            </div>
        </div>

        <a href="login.html" class="btn-gerenciar">Gerenciar perfis</a>
    </div>

    <script src="Js/profiles.js"></script>
</body>
</html>
