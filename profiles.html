<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quem está assistindo? - Netflix</title>
    <link rel="stylesheet" href="CSS/profiles.css">
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="profiles-container">
        <header class="profiles-header">
            <h1 class="logo">NETFLIX</h1>
            <!-- BOTÃO SAIR DA CONTA NO CANTO SUPERIOR -->
            <button id="btnSairConta" class="btn-sair-conta">Sair da conta</button>
        </header>

        <h2 class="titulo-perfil">Quem está assistindo?</h2>

        <div class="grid-perfis">
            <div class="card-perfil" data-perfil="Principal">
                <div class="avatar-perfil cor1">
                    <span id="inicialUsuario"></span>
                </div>
                <p class="nome-perfil">Principal</p>
            </div>
            <div class="card-perfil" data-perfil="Infantil">
                <div class="avatar-perfil cor2">👶</div>
                <p class="nome-perfil">Infantil</p>
            </div>
            <div class="card-perfil" data-perfil="Convidado">
                <div class="avatar-perfil cor3">👤</div>
                <p class="nome-perfil">Convidado</p>
            </div>
        </div>

        <!-- BOTÃO GERENCIAR PERFIS CORRIGIDO -->
        <button id="btnGerenciar" class="btn-gerenciar">Gerenciar perfis</button>

        <!-- Rodapé com aviso -->
        <footer class="rodape-perfil">
            <p class="aviso-demo">⚠️ Site apenas demonstrativo — Projeto de estudo de Análise e Desenvolvimento de
                Sistemas</p>
        </footer>
    </div>

    <script src="Js/profiles.js"></script>
</body>

</html>
