<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Netflix</title>
    <link rel="stylesheet" href="CSS/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">NETFLIX</h1>
            
            <ul class="nav-links">
                <li><a href="#" class="ativo">Início</a></li>
                <li><a href="#">Séries</a></li>
                <li><a href="#">Filmes</a></li>
                <li><a href="#">Minha Lista</a></li>
            </ul>

            <div class="nav-direita">
                <div class="busca">
                    <input type="text" id="campoBusca" placeholder="Buscar filmes...">
                </div>
                <div class="avatar-menu">
                    <div class="avatar-pequeno" id="avatarUsuario"></div>
                    <div class="menu-sair">
                        <button id="btnSair">Sair</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Banner Dinâmico -->
    <section class="banner">
        <div class="banner-conteudo">
            <h2 id="tituloBanner"></h2>
            <p id="descricaoBanner"></p>
            <div class="botoes-banner">
                <button class="btn btn-assistir">▶ Assistir</button>
                <button class="btn btn-info">ℹ Mais Informações</button>
            </div>
        </div>
    </section>

    <!-- Seção Continuar Assistindo -->
    <section class="secao">
        <div class="container">
            <h3 class="titulo-secao">🔥 Continuar Assistindo</h3>
            <div id="continuarAssistindo" class="carrossel"></div>
        </div>
    </section>

    <!-- Seção Minha Lista -->
    <section class="secao">
        <div class="container">
            <h3 class="titulo-secao">⭐ Minha Lista</h3>
            <div id="minhaLista" class="carrossel"></div>
        </div>
    </section>

    <!-- Seção Populares -->
    <section class="secao">
        <div class="container">
            <h3 class="titulo-secao">Populares</h3>
            <div id="populares" class="carrossel"></div>
        </div>
    </section>

    <!-- Modal Detalhes -->
    <div id="modalDetalhes" class="modal">
        <div class="modal-conteudo">
            <span class="fechar">&times;</span>
            <h2 id="modalTitulo"></h2>
            <p id="modalDescricao"></p>
            <div class="modal-botoes">
                <button class="btn btn-assistir">▶ Assistir</button>
                <button class="btn btn-favoritar">⭐ Favoritar</button>
            </div>
        </div>
    </div>

    <script src="Js/dashboard.js"></script>
</body>
</html>
