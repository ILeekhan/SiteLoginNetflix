<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Netflix</title>
    <link rel="stylesheet" href="CSS/login.css">
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="login-bg">
        <header class="login-header">
            <h1 class="logo">NETFLIX</h1>
        </header>

        <!-- Card de Login -->
        <div class="login-card">
            <h2>Entrar</h2>

            <form id="loginForm" class="form">
                <div class="input-group">
                    <input type="text" id="loginEmail" placeholder="E-mail ou usuário" required>
                </div>

                <div class="input-group senha-group">
                    <input type="password" id="loginSenha" placeholder="Senha" minlength="8" required>
                    <button type="button" class="btn-mostrar-senha">👁️</button>
                </div>

                <div class="lembrar">
                    <input type="checkbox" id="lembrarUsuario">
                    <label for="lembrarUsuario">Lembrar de mim</label>
                </div>

                <button type="submit" class="btn btn-entrar-grande">Entrar</button>

                <div id="loginLoading" class="loading" style="display: none;">Carregando...</div>
                <div id="loginErro" class="mensagem-erro" style="display: none;"></div>
            </form>

            <div class="links">
                <!-- BOTÃO CRIAR CONTA MAIS BONITO -->
                <a href="#" id="abrirCadastro" class="btn-criar-conta">✨ Criar nova conta</a>
                <a href="#" id="abrirRecuperar">Esqueci minha senha</a>
            </div>

            <div class="dark-mode-toggle">
                <label class="switch">
                    <input type="checkbox" id="darkMode">
                    <span class="slider"></span>
                </label>
                <span>Modo Escuro</span>
            </div>
        </div>
    </div>

    <!-- Modal Cadastro -->
    <div id="modalCadastro" class="modal">
        <div class="modal-conteudo">
            <span class="fechar">&times;</span>
            <h2>Criar Conta</h2>
            <form id="cadastroForm">
                <input type="text" id="nomeCompleto" placeholder="Nome completo" required>
                <input type="email" id="cadastroEmail" placeholder="E-mail" required>
                <input type="text" id="cadastroUsuario" placeholder="Nome de usuário" required>
                <input type="password" id="cadastroSenha" placeholder="Senha (mínimo 8 caracteres)" minlength="8"
                    required>
                <input type="password" id="confirmaSenha" placeholder="Confirmar senha" required>
                <button type="submit" class="btn btn-cadastrar">Criar Conta</button>
                <div id="cadastroErro" class="mensagem-erro"></div>
            </form>
        </div>
    </div>

    <!-- Modal Recuperar Senha -->
    <div id="modalRecuperar" class="modal">
        <div class="modal-conteudo">
            <span class="fechar">&times;</span>
            <h2>Recuperar Senha</h2>
            <form id="recuperarForm">
                <input type="email" id="recuperarEmail" placeholder="Digite seu e-mail" required>
                <button type="submit" class="btn btn-recuperar">Enviar</button>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="Js/auth.js"></script>
</body>

</html>
