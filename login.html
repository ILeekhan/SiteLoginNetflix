<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Faça login na sua conta Netflix ou crie uma nova para assistir filmes e séries.">
    <title>Entrar | Netflix Clone</title>

    <!-- Fonte otimizada, igual nas outras páginas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="CSS/login.css">
</head>

<body>
    <!-- Plano de fundo igual ao site oficial -->
    <div class="background"></div>
    <div class="overlay"></div>

    <header class="login-header">
        <div class="container">
            <h1 class="logo">NETFLIX</h1>
        </div>
    </header>

    <main class="login-main">
        <div class="container">
            <div class="login-container">
                <h2>Entrar</h2>

                <form id="loginForm" class="login-form">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="E-mail ou número de telefone" required>
                    </div>

                    <div class="input-group password-box">
                        <input type="password" id="password" placeholder="Senha" required>
                        <button type="button" id="togglePassword" class="toggle-btn" aria-label="Mostrar senha">
                            👁
                        </button>
                    </div>

                    <button type="submit" class="btn btn-red">Entrar</button>
                </form>

                <div id="message" class="message-box"></div>

                <div class="links">
                    <button type="button" id="openRegister" class="link-btn">Criar Conta</button>
                    <button type="button" id="openRecovery" class="link-btn">Esqueci Minha Senha</button>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL DE CADASTRO -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <span class="close-btn" id="closeRegister" aria-label="Fechar modal">&times;</span>
            <h2>Criar Conta</h2>

            <form id="registerForm" class="modal-form">
                <div class="input-group">
                    <input type="text" id="registerName" placeholder="Nome Completo" required>
                </div>
                <div class="input-group">
                    <input type="email" id="registerEmail" placeholder="E-mail" required>
                </div>
                <div class="input-group">
                    <input type="password" id="registerPassword" placeholder="Senha" required>
                </div>
                <div class="input-group">
                    <input type="password" id="registerConfirmPassword" placeholder="Confirmar Senha" required>
                </div>

                <button type="submit" class="btn btn-red">Criar Conta</button>
            </form>
        </div>
    </div>

    <!-- MODAL DE RECUPERAÇÃO DE SENHA -->
    <div class="modal" id="recoveryModal">
        <div class="modal-content">
            <span class="close-btn" id="closeRecovery" aria-label="Fechar modal">&times;</span>
            <h2>Recuperar Senha</h2>

            <form id="recoveryForm" class="modal-form">
                <div class="input-group">
                    <input type="email" placeholder="Digite seu e-mail cadastrado" required>
                </div>

                <button type="submit" class="btn btn-red">Enviar instruções</button>
            </form>
        </div>
    </div>

    <script src="Js/auth.js" defer></script>
</body>

</html>
