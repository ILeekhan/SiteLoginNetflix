<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone - Página Inicial</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Cabeçalho -->
    <header class="landing-header">
        <div class="logo">Netflix</div>
        <a href="login.html" class="btn-login">Entrar</a>
    </header>

    <!-- Seção Principal / Destaque -->
    <section class="hero">
        <div class="hero-content">
            <h2>Filmes, séries e muito mais. Sem limites.</h2>
            <p>Assista onde quiser. Cancele quando quiser.</p>
            <a href="login.html" class="btn-start">Vamos lá</a>
        </div>
    </section>

    <!-- Seção de Filmes -->
    <section class="movies">
        <h2>Em Alta</h2>
        <div class="movies-row">
            <div class="movie-card">
                <img src="assets/images/StrangerThingsCapa.jpg" alt="Stranger Things">
            </div>
            <div class="movie-card">
                <img src="assets/images/TheWitcherSerie.jpg" alt="The Witcher">
            </div>
            <div class="movie-card">
                <img src="assets/images/WandinhaSerie.jpg" alt="Wandinha">
            </div>
            <div class="movie-card">
                <img src="assets/images/DarkSerie.jpg" alt="Dark">
            </div>
        </div>
    </section>

    <!-- Rodapé -->
    <footer>
        <p>© 2026 Netflix Clone - Projeto para estudos</p>
    </footer>

    <script src="js/landing.js"></script>
</body>
</html>
