<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Netflix Clone</title>

    <link rel="stylesheet" href="CSS/landing.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <header>

        <h1 class="logo">
            NETFLIX
        </h1>

        <a href="login.html" class="btn-login">
            Entrar
        </a>

    </header>

    <section class="hero">

        <div class="hero-content">

            <h2>
                Filmes, séries e muito mais.
            </h2>

            <p>
                Assista onde quiser. Cancele quando quiser.
            </p>

            <a href="login.html" class="btn-start">
                Começar Agora
            </a>

        </div>

    </section>

    <section class="movies">

        <h2>Populares</h2>

        <div class="movies-row">

            <div class="movie-card">
                <img src="assets/images/StrangerThingsCapa.jpg" alt="Stranger Things">
            </div>

            <div class="movie-card">
                <img src="assets/images/TheWitcherSerie.jpg" alt="The Witcher">
            </div>

            <div class="movie-card">
                <img src="assets/images/WandinhaSerie.jpg" alt="Wandinha">
            </div>

            <div class="movie-card">
                <img src="assets/images/DarkSerie.jpg" alt="Dark">
            </div>

        </div>

    </section>

    <footer>

        <p>
            Projeto desenvolvido para Portfólio.
        </p>

    </footer>

    <script src="Js/landing.js"></script>

</body>

</html>
