<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone - Página Inicial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS DIRETO NO HTML - NÃO TEM MAIS ERRO DE CAMINHO -->
    <style>
        /* RESET TOTAL - SOBRESCREVE TUDO */
        * {
            margin: 0 !important;
            padding: 0 !important;
            box-sizing: border-box !important;
        }

        body {
            font-family: 'Poppins', sans-serif !important;
            background-color: #141414 !important;
            color: #ffffff !important;
            overflow-x: hidden !important;
        }

        a { text-decoration: none !important; color: inherit !important; }

        /* CABEÇALHO */
        .landing-header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 20px 40px !important;
            position: absolute !important;
            width: 100% !important;
            top: 0 !important;
            z-index: 100 !important;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent) !important;
        }

        .logo {
            color: #E50914 !important;
            font-size: 2rem !important;
            font-weight: 700 !important;
            letter-spacing: 1px !important;
        }

        .btn-login {
            background-color: #E50914 !important;
            color: #fff !important;
            padding: 8px 20px !important;
            border-radius: 3px !important;
            font-weight: 500 !important;
            font-size: 1rem !important;
            transition: background 0.2s !important;
        }

        .btn-login:hover { background-color: #b20710 !important; }

        /* SEÇÃO PRINCIPAL - BANNER AJUSTADO */
        .hero {
            width: 100% !important;
            height: 100vh !important;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                        url('assets/images/Revisão Código Portfolio (3).png') center/cover no-repeat !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            text-align: center !important;
            position: relative !important;
        }

        .hero-content {
            max-width: 650px !important;
            z-index: 2 !important;
        }

        .hero-content h2 {
            font-size: 3rem !important;
            margin-bottom: 15px !important;
            font-weight: 700 !important;
            line-height: 1.2 !important;
            color: #ffffff !important;
        }

        .hero-content p {
            font-size: 1.2rem !important;
            margin-bottom: 25px !important;
            color: #e5e5e5 !important;
        }

        .btn-start {
            background-color: #ffffff !important;
            color: #000000 !important;
            padding: 12px 30px !important;
            font-size: 1.1rem !important;
            font-weight: 600 !important;
            border-radius: 3px !important;
            transition: background 0.2s !important;
            display: inline-block !important;
        }

        .btn-start:hover { background-color: #e6e6e6 !important; }

        /* SEÇÃO EM ALTA - BANNERS DO TAMANHO CERTO */
        .movies {
            background-color: #141414 !important;
            padding: 40px 40px 60px !important;
        }

        .movies h2 {
            font-size: 1.3rem !important;
            margin-bottom: 20px !important;
            font-weight: 600 !important;
            color: #ffffff !important;
        }

        .movies-row {
            display: flex !important;
            gap: 15px !important;
            overflow-x: auto !important;
            padding-bottom: 10px !important;
            scrollbar-width: none !important;
        }

        .movies-row::-webkit-scrollbar { display: none !important; }

        .movie-card {
            min-width: 180px !important;
            max-width: 180px !important;
            height: 250px !important;
            border-radius: 4px !important;
            overflow: hidden !important;
            transition: transform 0.2s ease !important;
            cursor: pointer !important;
            flex-shrink: 0 !important;
            background-color: #222 !important;
        }

        .movie-card:hover { transform: scale(1.05) !important; }

        .movie-card img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            display: block !important;
            image-rendering: crisp-edges !important;
        }

        /* RODAPÉ */
        footer {
            background-color: #000000 !important;
            color: #777 !important;
            text-align: center !important;
            padding: 25px !important;
            font-size: 0.9rem !important;
            border-top: 1px solid #222 !important;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .landing-header { padding: 15px 20px !important; }
            .logo { font-size: 1.5rem !important; }
            .hero-content h2 { font-size: 2rem !important; }
            .movies { padding: 30px 20px !important; }
            .movie-card { min-width: 140px !important; max-width: 140px !important; height: 200px !important; }
        }
    </style>
</head>
<body>

    <header class="landing-header">
        <div class="logo">NETFLIX</div>
        <a href="login.html" class="btn-login">Entrar</a>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>Filmes, séries e muito mais. Sem limites.</h2>
            <p>Assista onde quiser. Cancele quando quiser.</p>
            <a href="login.html" class="btn-start">Vamos lá</a>
        </div>
    </section>

    <section class="movies">
        <h2>Em Alta</h2>
        <div class="movies-row">
            <div class="movie-card">
                <img src="assets/images/Revisão Código Portfolio (3).png" alt="Stranger Things">
            </div>
            <div class="movie-card">
                <img src="assets/images/Revisão Código Portfolio (2).png" alt="The Witcher">
            </div>
            <div class="movie-card">
                <img src="assets/images/Revisão Código Portfolio (1).png" alt="Wandinha">
            </div>
            <div class="movie-card">
                <img src="assets/images/Revisão Código Portfolio.png" alt="Dark">
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Netflix Clone - Projeto para estudos</p>
    </footer>

</body>
</html>
